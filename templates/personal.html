<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal AI Chat</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- KaTeX for Math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
    <style>
        :root {
            /* Premium Dark Theme Tokens */
            --bg-base: #06090e;
            --bg-surface: #0d121c;
            --bg-surface-hi: #1a2235;
            --bg-surface-active: #25314a;
            
            --primary: #00e5ff;
            --primary-dim: rgba(0, 229, 255, 0.15);
            --primary-glow: 0 0 20px rgba(0, 229, 255, 0.4);
            
            --secondary: #ff007f;
            --secondary-dim: rgba(255, 0, 127, 0.15);
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-subtle: #475569;
            
            --border-light: rgba(255, 255, 255, 0.08);
            --border-radius: 16px;
            
            /* Glassmorphism */
            --glass-bg: rgba(13, 18, 28, 0.6);
            --glass-border: 1px solid rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 229, 255, 0.04), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 127, 0.04), transparent 25%);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-surface-hi); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* --- Sidebar --- */
        .sidebar {
            width: 360px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-light);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 100;
            box-shadow: 5px 0 30px rgba(0,0,0,0.5);
            overflow-y: auto;
            position: absolute;
            left: -360px;
            height: 100%;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .sidebar.open {
            left: 0;
        }

        /* Overlay */
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .sidebar-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .brand i {
            font-size: 24px;
            color: var(--primary);
            text-shadow: var(--primary-glow);
        }

        .brand h1 {
            font-weight: 800;
            font-size: 1.4rem;
            background: linear-gradient(90deg, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        input[type="text"] {
            background: var(--bg-base);
            border: 1px solid var(--border-light);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-dim);
        }

        /* Characters Grid */
        .char-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            max-height: 40vh;
            overflow-y: auto;
            padding-right: 5px;
        }

        .char-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-base);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .char-card:hover {
            border-color: var(--text-subtle);
            transform: translateX(4px);
        }
        
        .char-card input[type="radio" name="selected_character"] {
            display: none;
        }

        .char-card.selected {
            background: var(--primary-dim);
            border-color: var(--primary);
        }

        .char-avatar {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            object-fit: cover;
            background: var(--bg-surface-hi);
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }
        
        .char-card.selected .char-avatar {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-dim);
        }

        .char-info {
            flex: 1;
            overflow: hidden;
        }

        .char-name {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }
        
        .char-status {
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .char-card.selected .char-status {
            opacity: 1;
            color: var(--primary);
        }

        /* Controls */
        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: auto;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--bg-surface-hi);
            color: var(--text-main);
            border: 1px solid var(--border-light);
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover:not(:disabled) {
            background: var(--bg-surface-active);
            transform: translateY(-2px);
        }
        
        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary {
            grid-column: span 2;
            background: var(--primary);
            color: #000;
            border: none;
            box-shadow: 0 4px 20px rgba(0, 229, 255, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            background: #33eeff;
            box-shadow: 0 6px 25px rgba(0, 229, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-base);
            border: 1px solid var(--border-light);
            border-radius: 12px;
        }
        
        .toggle-label {
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Toggle Switch CSS */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-surface-hi);
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: var(--text-muted);
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before {
            transform: translateX(20px);
            background-color: #000;
        }

        /* --- Chat Arena --- */
        .chat-arena {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            width: 100%;
        }

        .hamburger {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
            margin-right: 16px;
            display: flex;
            align-items: center;
        }
        .hamburger:hover { color: var(--primary); }

        .chat-header {
            padding: 16px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
        }

        .chat-header-info h2 {
            font-weight: 700;
            font-size: 1.2rem;
        }

        .chat-header-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .chat-log {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
            scroll-behavior: smooth;
            padding-bottom: 20px;
        }

        .chat-input-area {
            padding: 20px 40px;
            background: var(--bg-surface);
            border-top: 1px solid var(--border-light);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input-area input[type="text"] {
            flex: 1;
            background: var(--bg-base);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 16px 24px;
            font-size: 1.05rem;
        }

        .send-btn {
            background: var(--primary);
            color: #000;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
        }
        .send-btn:hover {
            transform: scale(1.05);
            background: #33eeff;
        }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Message Bubbles */
        .message-wrapper {
            display: flex;
            gap: 20px;
            max-width: 85%;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid var(--border-light);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .msg-body {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .msg-speaker {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .msg-time {
            font-size: 0.75rem;
            color: var(--text-subtle);
            font-weight: 500;
        }

        .msg-content {
            background: var(--bg-surface);
            padding: 18px 24px;
            border-radius: 4px 20px 20px 20px;
            border: 1px solid var(--border-light);
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-main);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        
        .msg-content.system {
            background: var(--secondary-dim);
            border-color: var(--secondary);
            color: var(--secondary);
            font-weight: 500;
        }

        /* Markdown Styling within message */
        .msg-content p { margin-bottom: 0.8em; }
        .msg-content p:last-child { margin-bottom: 0; }
        .msg-content code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-base);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            color: var(--primary);
        }
        .msg-content pre {
            background: var(--bg-base);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border-light);
            margin: 10px 0;
        }
        .msg-content pre code {
            background: transparent;
            padding: 0;
            color: var(--text-main);
        }
        .msg-content blockquote {
            border-left: 3px solid var(--primary);
            padding-left: 12px;
            margin: 10px 0;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Typing Indicator */
        .typing-wrapper {
            display: none;
            gap: 20px;
            max-width: 85%;
        }
        .typing-wrapper.active {
            display: flex;
        }
        
        .typing-bubble {
            background: var(--bg-surface);
            padding: 16px 24px;
            border-radius: 4px 20px 20px 20px;
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 6px;
            height: fit-content;
        }

        .dot {
            width: 8px; height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; } 
            40% { transform: scale(1); opacity: 1; box-shadow: 0 0 10px var(--primary); } 
        }

    </style>
</head>
<body>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="brand">
            <i class="ri-blaze-line"></i>
            <h1>Personal Chat</h1>
        </div>
        
        <div class="control-group">
            <label><i class="ri-user-line"></i> Your Name</label>
            <input type="text" id="userNameInput" value="Sword">
        </div>

        <div class="control-group">
            <label><i class="ri-chat-1-line"></i> Chat Topic</label>
            <input type="text" id="topicInput" value="The ethics of AI in creative arts">
        </div>

        

        <div class="control-group">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label><i class="ri-group-line"></i> Partner (Select 1)</label>
                <button class="btn" style="padding: 4px 8px; font-size: 0.8rem; background: var(--primary-dim); color: var(--primary); border: 1px solid var(--primary);" onclick="document.getElementById('charInput').click()">
                    <i class="ri-upload-2-line"></i> Add Card
                </button>
                <input type="file" id="charInput" style="display: none;" accept=".png" onchange="uploadCharacter()">
            </div>
            <div class="char-grid" id="charContainer">
                <!-- Dynamically populated -->
            </div>
        </div>

        
            <label class="switch">
                <input type="radio" name="selected_character" id="autoPlayToggle" onchange="toggleAutoPlay()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="action-row">
            <button class="btn btn-primary" id="startBtn" onclick="generateTurn()">
                <i class="ri-flashlight-fill"></i> Next Turn
            </button>
            <button class="btn" onclick="clearChat()">
                <i class="ri-refresh-line"></i> Reset
            </button>
            <button class="btn" onclick="downloadTranscript()">
                <i class="ri-download-line"></i> Export
            </button>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-arena">
        <div class="chat-header">
            <div style="display: flex; align-items: center;">
                <button class="hamburger" onclick="toggleSidebar()"><i class="ri-menu-line"></i></button>
                <div class="chat-header-info">
                    <h2 id="headerTopic">The ethics of AI in creative arts</h2>
                    <p id="headerMeta">0 Turns • 0 Participants Active</p>
                </div>
            </div>
            <div id="statusBadge" style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); background: var(--bg-surface); padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border-light);">
                <i class="ri-checkbox-blank-circle-fill" style="font-size: 10px;"></i> Idle
            </div>
        </div>

        <div class="chat-log" id="chatLog">
            <!-- Messages -->
        </div>
        
        <!-- Typing Indicator -->
        <div class="typing-wrapper" id="typingIndicator" style="padding-left: 40px; margin-bottom: 20px;">
            <img src="" id="typingAvatar" class="msg-avatar" style="border-color: var(--primary);">
            <div class="typing-bubble">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userMsgInput" placeholder="Type a message as User..." onkeypress="handleEnter(event)">
            <button class="send-btn" id="sendBtn" onclick="sendUserMessage()">
                <i class="ri-send-plane-fill"></i>
            </button>
        </div>
    </div>

    <script>
        // Generate or retrieve session ID
        let sessionId = localStorage.getItem('debateSessionId');
        if (!sessionId) {
            sessionId = 'sess_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('debateSessionId', sessionId);
        }

        let chatHistory = [];
        let globalCharacters = [];
        
        
        let isGenerating = false;
        
        
        async function syncSessionToServer() {
            try {
                const characters = Array.from(document.querySelectorAll('.char-card input:checked')).map(cb => cb.value);
                const topic = document.getElementById('topicInput').value;
                await fetch('/api/sync_session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        topic: topic,
                        characters: characters,
                        history: chatHistory
                    })
                });
                // Persist locally too
                localStorage.setItem('debateHistory', JSON.stringify(chatHistory));
                localStorage.setItem('debateTopic', topic);
                
                localStorage.setItem('debateChars', JSON.stringify(characters));
            } catch (e) {
                console.error("Sync failed:", e);
            }
        }

        function restoreSession() {
            const savedHistory = localStorage.getItem('debateHistory');
            if (savedHistory) {
                chatHistory = JSON.parse(savedHistory);
                chatHistory.forEach(msg => appendMessage(msg.speaker, msg.text));
            }
            const savedTopic = localStorage.getItem('debateTopic');
            if (savedTopic) document.getElementById('topicInput').value = savedTopic;
            
            
            
            const savedChars = localStorage.getItem('debateChars');
            if (savedChars) {
                const chars = JSON.parse(savedChars);
                document.querySelectorAll('.char-card input').forEach(cb => {
                    cb.checked = chars.includes(cb.value);
                });
            }
        }
        
        // Configure marked.js to be safe and support math
        marked.use(window.markedKatex({throwOnError: false}));
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }

        async function loadCharacters() {
            try {
                const res = await fetch('/api/characters');
                globalCharacters = await res.json();
                
                const container = document.getElementById('charContainer');
                container.innerHTML = '';
                
                globalCharacters.forEach((char, idx) => {
                    // Pre-select first 3 characters if available
                    const isSelected = idx < 3;
                    const fallbackImg = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44"><rect width="44" height="44" fill="%231a2235"/><text x="22" y="27" text-anchor="middle" fill="white" font-size="16" font-family="sans-serif">${char.name.charAt(0)}</text></svg>`;
                    const imgSrc = char.image ? `/${char.image}` : fallbackImg;
                    
                    const html = `
                    <label class="char-card ${isSelected ? 'selected' : ''}">
                        <input type="radio" name="selected_character" value="${char.name}" ${isSelected ? 'checked' : ''} onchange="updateCharCard(this)">
                        <img src="${imgSrc}" class="char-avatar" onerror="this.src='${fallbackImg}'">
                        <div class="char-info">
                            <div class="char-name">${char.name}</div>
                            <div class="char-status">Active Participant</div>
                        </div>
                    </label>
                    `;
                    container.innerHTML += html;
                });
                updateHeaderMeta();
            } catch (e) {
                console.error("Failed to load characters", e);
            }
        }

        function updateCharCard(checkbox) {
            const card = checkbox.closest('.char-card');
            if (checkbox.checked) card.classList.add('selected');
            else card.classList.remove('selected');
            updateHeaderMeta();
        }

        function getSelectedCharacters() {
            const checkboxes = document.querySelectorAll('.char-card input[type="radio" name="selected_character"]:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        function updateHeaderMeta() {
            const chars = getSelectedCharacters();
            document.getElementById('headerMeta').innerText = `${chatHistory.length} Turns • ${chars.length} Participants Active`;
            document.getElementById('headerTopic').innerText = document.getElementById('topicInput').value || "General Discussion";
        }

        // Auto-play Logic
        
        }

        async function generateTurn() {
            if (isGenerating) return;
            
            const topic = document.getElementById('topicInput').value;
            const characters = getSelectedCharacters();
            
            if (characters.length < 1) {
                alert("Please select 1 character.");
                
                return;
            }

            // Determine next speaker on frontend
            let nextCharName = characters[0];
            const mode = 'round_robin';
            const userName = document.getElementById('userNameInput').value || "User";

            // Mention Checking
            let mentionedChars = [];
            if (chatHistory.length > 0) {
                const lastMsg = chatHistory[chatHistory.length - 1].text.toLowerCase();
                characters.forEach(char => {
                    // split character name if it has a pipe, etc. e.g. "Hector| Isekai..." -> "Hector"
                    const simpleName = char.split('|')[0].trim().toLowerCase();
                    const regex = new RegExp(`\\b${simpleName}\\b`);
                    if (regex.test(lastMsg)) {
                        mentionedChars.push(char);
                    }
                });
            }

            if (mentionedChars.length > 0) {
                nextCharName = mentionedChars[Math.floor(Math.random() * mentionedChars.length)];
            } else if (mode === "round_robin" && chatHistory.length > 0) {
                const lastSpeaker = chatHistory[chatHistory.length - 1].speaker;
                const lastIdx = characters.indexOf(lastSpeaker);
                if (lastIdx !== -1) {
                    nextCharName = characters[(lastIdx + 1) % characters.length];
                }
            } else if (mode === "random") {
                nextCharName = characters[Math.floor(Math.random() * characters.length)];
            }
            
            const charObj = globalCharacters.find(c => c.name === nextCharName);
            const fallbackImg = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56"><rect width="56" height="56" fill="%231a2235"/></svg>`;
            document.getElementById('typingAvatar').src = charObj && charObj.image ? `/${charObj.image}` : fallbackImg;

            isGenerating = true;
            const btn = document.getElementById('startBtn');
            const typing = document.getElementById('typingIndicator');
            const chatLog = document.getElementById('chatLog');

            btn.disabled = true;
            btn.innerHTML = `<i class="ri-loader-4-line" style="animation: spin 1s linear infinite;"></i> Generating...`;
            typing.classList.add('active');
            chatLog.scrollTop = chatLog.scrollHeight;
            updateHeaderMeta();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        topic: topic,
                        characters: characters,
                        history: chatHistory,
                        user_name: userName,
                        mode: mode,
                        forced_speaker: nextCharName,
                        is_personal: true
                    })
                });

                if (!response.ok) throw new Error("Server returned " + response.status);
                
                const data = await response.json();
                chatHistory.push({ speaker: data.speaker, text: data.text });
                appendMessage(data.speaker, data.text);
                updateHeaderMeta();
                syncSessionToServer();

            } catch (error) {
                console.error("Error:", error);
                appendMessage("System", "Failed to connect to LLM endpoint or endpoint error.");
                
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="ri-flashlight-fill"></i> Next Turn`;
                typing.classList.remove('active');
                isGenerating = false;
                
                
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendUserMessage();
        }

        async function sendUserMessage() {
            if (isGenerating) return;
            const input = document.getElementById('userMsgInput');
            const text = input.value.trim();
            if (!text) return;

            const userName = document.getElementById('userNameInput').value || "User";
            
            // Add user message to UI and history
            chatHistory.push({ speaker: userName, text: text });
            appendMessage(userName, text);
            input.value = '';
            updateHeaderMeta();
            syncSessionToServer();

            generateTurn();
        }

        function appendMessage(speaker, text) {
            const chatLog = document.getElementById('chatLog');
            
            if (speaker === "System") {
                const msgHTML = `
                    <div class="message-wrapper" style="max-width: 100%;">
                        <div class="msg-content system" style="width: 100%;">
                            <i class="ri-error-warning-line"></i> ${text}
                        </div>
                    </div>`;
                chatLog.innerHTML += msgHTML;
                chatLog.scrollTop = chatLog.scrollHeight;
                return;
            }

            const userName = document.getElementById('userNameInput').value || "User";
            const charObj = globalCharacters.find(c => c.name === speaker);
            const fallbackImg = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56"><rect width="56" height="56" fill="%231a2235"/><text x="28" y="34" text-anchor="middle" fill="white" font-size="20" font-family="sans-serif">${speaker.charAt(0)}</text></svg>`;
            
            let imgSrc = fallbackImg;
            if (speaker === userName) {
                imgSrc = "/images/images.jpeg";
            } else if (charObj && charObj.image) {
                imgSrc = `/${charObj.image}`;
            }
            
            // Format time
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            // Clean up explicit \n from LLM response if present, then Parse Markdown
            const cleanedText = text.replace(/\\n/g, '\n');
            const parsedText = marked.parse(cleanedText);

            const msgHTML = `
                <div class="message-wrapper">
                    <img src="${imgSrc}" class="msg-avatar" onerror="this.src='${fallbackImg}'">
                    <div class="msg-body">
                        <div class="msg-meta">
                            <span class="msg-speaker">${speaker}</span>
                            <span class="msg-time">${time}</span>
                        </div>
                        <div class="msg-content">
                            ${parsedText}
                        </div>
                    </div>
                </div>
            `;
            
            chatLog.innerHTML += msgHTML;
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function clearChat() {
            chatHistory = [];
            document.getElementById('chatLog').innerHTML = '';
            
            updateHeaderMeta();
            
            // Create a new session so old messages aren't overridden but kept for training
            sessionId = 'sess_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('debateSessionId', sessionId);
            localStorage.setItem('debateHistory', JSON.stringify([]));
        }
        
        async function downloadTranscript() {
            if (chatHistory.length === 0) return alert("No transcript to download.");
            
            try {
                const response = await fetch('/api/export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        topic: document.getElementById('topicInput').value,
                        characters: getSelectedCharacters(),
                        history: chatHistory
                    })
                });
                
                const data = await response.json();
                if (data.status === 'success') {
                    alert("Chat exported successfully to: " + data.file);
                    clearChat();
                } else {
                    alert("Export failed.");
                }
            } catch(e) {
                console.error(e);
                alert("Export failed due to error.");
            }
        }

        // Add custom animation for spinner
        document.head.insertAdjacentHTML('beforeend', `<style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>`);

        // Initialize
        loadCharacters().then(() => {
            restoreSession();
            updateHeaderMeta();
        });
        
        // Setup topic change listener
        document.getElementById('topicInput').addEventListener('input', updateHeaderMeta);

        async function uploadCharacter() {
            const input = document.getElementById('charInput');
            if (input.files.length > 0) {
                const formData = new FormData();
                formData.append("file", input.files[0]);
                
                try {
                    const res = await fetch('/api/upload_character', { method: 'POST', body: formData });
                    if(res.ok) {
                        alert("Character uploaded successfully!");
                        loadCharacters(); // Refresh list
                    } else {
                        alert("Failed to upload character.");
                    }
                } catch(e) {
                    console.error(e);
                    alert("Error uploading character.");
                }
            }
        }
    </script>
</body>
