<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Debate - Knowledge Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-base: #06090e;
            --bg-surface: #0d121c;
            --primary: #00e5ff;
            --secondary: #ff007f;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-light: rgba(255, 255, 255, 0.08);
            --primary-glow: 0 0 20px rgba(0, 229, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 229, 255, 0.05), transparent 50%);
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 40px;
            background: rgba(13, 18, 28, 0.6);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .upload-area {
            border: 2px dashed var(--border-light);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(0, 229, 255, 0.05);
        }

        .upload-area i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .type-selector label {
            flex: 1;
            padding: 12px;
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
        }

        .type-selector input[type="radio"] { display: none; }
        
        .type-selector input[type="radio"]:checked + label {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--bg-surface);
            color: var(--text-main);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
        }

        #fileInput { display: none; }
        
        .status {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--primary);
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>RAG Knowledge Hub</h1>
            <p style="color: var(--text-muted); margin-top: 8px;">Inject documents into the Debate AI brain</p>
        </div>
        
        <div class="type-selector">
            <input type="radio" id="typeDoc" name="docType" value="doc" checked>
            <label for="typeDoc"><i class="ri-file-text-line"></i> Document (.pdf, .txt)</label>
            
            <input type="radio" id="typeCode" name="docType" value="code">
            <label for="typeCode"><i class="ri-code-box-line"></i> Code (.py, .cpp)</label>
        </div>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <i class="ri-cloud-upload-line"></i>
            <h3 id="fileName">Click to Browse</h3>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 5px;">or drag and drop files here</p>
        </div>
        
        <input type="file" id="fileInput" onchange="handleFileSelect()">
        
        <div class="status" id="statusMessage"></div>
        
        <div class="indexed-files-container" style="margin-top: 20px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid var(--border-light);">
            <h4 style="margin-bottom: 10px; color: var(--text-muted); font-size: 0.9rem;">📚 Indexed Memory</h4>
            <div id="ragReport" style="font-size: 0.85rem; max-height: 100px; overflow-y: auto; color: var(--primary);">
                Loading...
            </div>
        </div>

        <button class="btn" style="background: var(--primary); color: #000; border: none; font-size: 1.1rem; margin-top: 20px;" onclick="uploadFile()">
            <i class="ri-upload-2-fill"></i> Upload & Index
        </button>
        
        <a href="/" class="btn"><i class="ri-arrow-left-line"></i> Back to Hub</a>
    </div>

    <script>
        let selectedFile = null;

        function handleFileSelect() {
            const input = document.getElementById('fileInput');
            if (input.files.length > 0) {
                selectedFile = input.files[0];
                document.getElementById('fileName').innerText = selectedFile.name;
                document.getElementById('statusMessage').innerText = "";
            }
        }

        async function uploadFile() {
            if (!selectedFile) {
                document.getElementById('statusMessage').innerText = "⚠️ Please select a file first.";
                return;
            }

            const type = document.querySelector('input[name="docType"]:checked').value;
            const formData = new FormData();
            formData.append("file", selectedFile);
            formData.append("type", type);

            document.getElementById('statusMessage').innerHTML = `<i class="ri-loader-4-line" style="animation: spin 1s linear infinite;"></i> Indexing...`;

            try {
                const response = await fetch('/api/upload_knowledge', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    document.getElementById('statusMessage').innerHTML = `✅ Successfully indexed <b>${selectedFile.name}</b>`;
                    selectedFile = null;
                    document.getElementById('fileName').innerText = "Click to Browse";
                    fetchRagReport();
                } else {
                    document.getElementById('statusMessage').innerHTML = `❌ Error: ${result.detail || 'Upload failed'}`;
                }
            } catch (error) {
                document.getElementById('statusMessage').innerHTML = `❌ Network Error: Could not reach server.`;
            }
        }
        
        async function fetchRagReport() {
            try {
                const res = await fetch('/api/rag_report');
                const data = await res.json();
                const reportDiv = document.getElementById('ragReport');
                if (data.indexed && data.indexed.length > 0) {
                    reportDiv.innerHTML = data.indexed.map(f => `<div style="padding: 4px 0;"><i class="ri-check-line"></i> ${f}</div>`).join('');
                } else {
                    reportDiv.innerHTML = `<span style="color: var(--text-muted);">No documents indexed yet.</span>`;
                }
            } catch (e) {
                document.getElementById('ragReport').innerHTML = "Failed to load report.";
            }
        }
        
        // Init
        fetchRagReport();
    </script>
</body>
</html>
