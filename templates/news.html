<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Debate - Global News</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-base: #06090e;
            --bg-surface: #0d121c;
            --bg-surface-hi: #1a2235;
            --primary: #00e5ff;
            --secondary: #ff007f;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-light: rgba(255, 255, 255, 0.08);
            --primary-glow: 0 0 20px rgba(0, 229, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 10% 90%, rgba(255, 0, 127, 0.05), transparent 40%);
            padding: 40px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: var(--bg-surface);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-actions .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-surface-hi);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            border: 1px solid var(--border-light);
            font-weight: 600;
            transition: all 0.3s;
        }

        .header-actions .btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .news-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .news-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.1);
        }

        .news-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .news-card:hover::before {
            opacity: 1;
        }

        .news-source {
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .news-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .news-summary {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .news-analysis {
            background: var(--bg-surface-hi);
            padding: 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            border-left: 3px solid var(--secondary);
            color: var(--text-main);
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: var(--bg-surface);
            border-radius: 20px;
            border: 1px dashed var(--border-light);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1><i class="ri-global-line" style="color: var(--primary);"></i> Global News Feed</h1>
            <div class="header-actions">
                <a href="/" class="btn"><i class="ri-home-line"></i> Hub</a>
            </div>
        </div>

        <div class="news-grid" id="newsContainer">
            <div class="empty-state">
                <i class="ri-loader-4-line" style="animation: spin 1s linear infinite;"></i>
                <h2>Loading News...</h2>
            </div>
        </div>
    </div>

    <script>
        async function loadNews() {
            try {
                const res = await fetch('/api/news_data');
                const data = await res.json();
                
                const container = document.getElementById('newsContainer');
                container.innerHTML = '';
                
                if (!data || data.length === 0) {
                    container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="ri-newspaper-line"></i>
                        <h2>No News Found</h2>
                        <p style="color: var(--text-muted); margin-top: 10px;">Run the news harvester script to populate data.</p>
                    </div>`;
                    return;
                }

                data.forEach(item => {
                    let analysisHTML = '';
                    if (item.analysis) {
                        analysisHTML = `<div class="news-analysis"><i class="ri-brain-line"></i> ${item.analysis}</div>`;
                    }

                    const html = `
                    <div class="news-card">
                        <div class="news-source"><i class="ri-rss-line"></i> ${item.source}</div>
                        <h3 class="news-title">${item.title}</h3>
                        <p class="news-summary">${item.summary.substring(0, 150)}${item.summary.length > 150 ? '...' : ''}</p>
                        ${analysisHTML}
                    </div>
                    `;
                    container.innerHTML += html;
                });
            } catch (error) {
                console.error(error);
                document.getElementById('newsContainer').innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="ri-error-warning-line" style="color: var(--secondary);"></i>
                        <h2>Error loading news</h2>
                    </div>`;
            }
        }

        document.head.insertAdjacentHTML('beforeend', `<style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>`);
        loadNews();
    </script>
</body>
</html>
